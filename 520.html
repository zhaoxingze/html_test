<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>520 - 我爱你，宝宝</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Georgia','STKaiti','KaiTi',serif}
body{background:linear-gradient(135deg,#fce4ec 0%,#f8bbd0 30%,#f48fb1 60%,#f06292 100%);display:flex;align-items:center;justify-content:center}
canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* === Envelope Stage === */
#envelope-stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:20px;animation:fadeIn 1.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.envelope{width:260px;height:180px;position:relative;cursor:pointer;perspective:800px;filter:drop-shadow(0 8px 25px rgba(0,0,0,.15))}
.envelope-body{width:100%;height:100%;background:linear-gradient(145deg,#fff5f5,#ffe0e0);border-radius:8px;border:2px solid #f8a4b8;position:relative;overflow:hidden}
.envelope-body::after{content:'';position:absolute;inset:6px;border:1px dashed #f48fb1;border-radius:4px;opacity:.4}
.envelope-flap{position:absolute;top:0;left:0;width:100%;height:50%;background:linear-gradient(180deg,#f8a4b8,#f48fb1);clip-path:polygon(0 0,50% 100%,100% 0);transform-origin:top center;transition:transform .8s cubic-bezier(.4,0,.2,1);z-index:2}
.envelope-flap.open{transform:rotateX(180deg)}
.envelope-seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:radial-gradient(circle,#e91e63,#c2185b);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 2px 10px rgba(233,30,99,.5);transition:opacity .4s}
.envelope-seal span{color:#fff;font-size:20px;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.envelope-seal.hidden{opacity:0;pointer-events:none}
.envelope-text{color:#c2185b;font-size:18px;letter-spacing:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
.hint{color:#ad1457;font-size:13px;opacity:.7;margin-top:5px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* === Card Stage === */
#card-stage{position:relative;z-index:10;width:320px;max-width:90vw;perspective:1200px;display:none}
.card-flipper{width:100%;min-height:480px;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.4,0,.2,1)}
.card-flipper.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;min-height:480px;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{background:linear-gradient(160deg,#fff 0%,#fce4ec 100%);border:2px solid #f8bbd0;box-shadow:0 10px 40px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.card-front h1{font-size:28px;color:#e91e63;font-family:'STKaiti','KaiTi','Georgia',serif;text-align:center;line-height:1.6;text-shadow:0 2px 8px rgba(233,30,99,.2)}
.card-front .divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#e91e63,transparent);margin:15px 0}
.card-front .illustration{font-size:64px;margin:10px 0;animation:heartbeat 1.5s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
.card-front p{color:#880e4f;font-size:14px;text-align:center;line-height:1.8;opacity:.8}

.card-back{background:linear-gradient(160deg,#fff0f5,#ffe4e1,#fff);border:2px solid #f8bbd0;box-shadow:0 10px 40px rgba(0,0,0,.12);transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.card-back .to-name{font-size:16px;color:#c2185b;letter-spacing:2px;margin-bottom:12px;opacity:.8}
.card-back .main-msg{font-size:30px;color:#e91e63;font-family:'STKaiti','KaiTi','Georgia',serif;text-align:center;line-height:1.7;font-weight:bold;text-shadow:0 2px 10px rgba(233,30,99,.25);margin-bottom:8px}
.card-back .sub-msg{font-size:15px;color:#ad1457;text-align:center;line-height:1.7;margin-bottom:25px;opacity:.85}
.card-back .heart-btn{padding:12px 36px;background:linear-gradient(135deg,#e91e63,#f06292);color:#fff;border:none;border-radius:50px;font-size:16px;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(233,30,99,.4);transition:all .3s;font-family:inherit;position:relative;overflow:hidden}
.card-back .heart-btn:active{transform:scale(.95)}
.card-back .heart-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);transform:scale(0);animation:ripple .6s ease-out}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* === Fireworks === */
#fireworks-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none}

/* === Love Popup === */
#love-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:30px 40px;border-radius:20px;box-shadow:0 10px 50px rgba(0,0,0,.15);text-align:center;transition:transform .5s cubic-bezier(.68,-.55,.27,1.55);pointer-events:none}
#love-popup.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto}
#love-popup .popup-heart{font-size:48px;animation:heartbeat 1s infinite}
#love-popup .popup-text{font-size:20px;color:#e91e63;margin-top:10px;font-family:'STKaiti','KaiTi','Georgia',serif}
#love-popup .popup-sub{font-size:13px;color:#ad1457;margin-top:6px;opacity:.7}

/* === Music Toggle === */
#music-btn{position:fixed;top:16px;right:16px;z-index:200;width:36px;height:36px;background:rgba(255,255,255,.8);border:1px solid #f8bbd0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(5px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
#music-btn.playing{animation:musicSpin 3s linear infinite}
@keyframes musicSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#music-btn.hidden{display:none}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- Envelope Stage -->
<div id="envelope-stage">
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="envelope-flap" id="flap"></div>
    <div class="envelope-seal" id="seal"><span>520</span></div>
    <div class="envelope-body"></div>
  </div>
  <div class="envelope-text">一封给你的信</div>
  <div class="hint">轻触信封开启 ~</div>
</div>

<!-- Card Stage -->
<div id="card-stage">
  <div class="card-flipper" id="card">
    <div class="card-front">
      <div class="illustration">💌</div>
      <h1>520 快乐</h1>
      <div class="divider"></div>
      <p>这是一封只属于你的告白<br>请翻到背面 ~</p>
    </div>
    <div class="card-back">
      <div class="to-name">TO 宝宝</div>
      <div class="main-msg">520，我爱你</div>
      <div class="sub-msg">遇见你是最美的意外<br>余生请多指教 ❤️</div>
      <button class="heart-btn" id="heartBtn" onclick="showLove(this)">💕 心动反馈</button>
    </div>
  </div>
</div>

<!-- Fireworks Canvas -->
<canvas id="fireworks-canvas"></canvas>

<!-- Love Popup -->
<div id="love-popup">
  <div class="popup-heart">❤️</div>
  <div class="popup-text">我也超爱你 ❤️</div>
  <div class="popup-sub">永远在一起 ~</div>
</div>

<!-- Music Button -->
<div id="music-btn" class="hidden" onclick="toggleMusic()">🎵</div>

<script>
// ========== Particle System (Petals + Stars) ==========
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let pW, pH;
const particles = [];
const PARTICLE_COUNT = 45;

function resizeP() {
  pW = pCanvas.width = window.innerWidth;
  pH = pCanvas.height = window.innerHeight;
}
resizeP();
window.addEventListener('resize', resizeP);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * pW;
    this.y = init ? Math.random() * pH : -20;
    this.size = Math.random() * 8 + 4;
    this.speedY = Math.random() * 0.8 + 0.3;
    this.speedX = Math.random() * 0.6 - 0.3;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.type = Math.random() > 0.5 ? 'petal' : 'star';
    this.color = this.type === 'petal'
      ? `hsla(${340 + Math.random() * 20}, 80%, ${70 + Math.random() * 15}%, ${this.opacity})`
      : `hsla(${40 + Math.random() * 20}, 100%, ${80 + Math.random() * 15}%, ${this.opacity})`;
    this.sway = Math.random() * Math.PI * 2;
    this.swaySpeed = Math.random() * 0.02 + 0.005;
  }
  update() {
    this.y += this.speedY;
    this.sway += this.swaySpeed;
    this.x += this.speedX + Math.sin(this.sway) * 0.3;
    this.rotation += this.rotSpeed;
    if (this.y > pH + 20) this.reset(false);
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    if (this.type === 'petal') {
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size, this.size * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      this.drawStar(ctx, 0, 0, 5, this.size, this.size * 0.45);
    }
    ctx.restore();
  }
  drawStar(ctx, cx, cy, spikes, outerR, innerR) {
    let rot = Math.PI / 2 * 3, step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
      rot += step;
    }
    ctx.closePath();
    ctx.fill();
  }
}
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

function animateParticles() {
  pCtx.clearRect(0, 0, pW, pH);
  particles.forEach(p => { p.update(); p.draw(pCtx); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== Envelope Logic ==========
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;
  // Vibrate
  if (navigator.vibrate) navigator.vibrate(80);
  document.getElementById('flap').classList.add('open');
  document.getElementById('seal').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('envelope-stage').style.transition = 'opacity .5s, transform .5s';
    document.getElementById('envelope-stage').style.opacity = '0';
    document.getElementById('envelope-stage').style.transform = 'scale(0.8) translateY(-30px)';
  }, 600);
  setTimeout(() => {
    document.getElementById('envelope-stage').style.display = 'none';
    const cs = document.getElementById('card-stage');
    cs.style.display = 'block';
    cs.style.opacity = '0';
    cs.style.transform = 'translateY(40px)';
    requestAnimationFrame(() => {
      cs.style.transition = 'opacity .8s ease, transform .8s ease';
      cs.style.opacity = '1';
      cs.style.transform = 'translateY(0)';
    });
    // Auto flip after 1.2s
    setTimeout(() => {
      document.getElementById('card').classList.add('flipped');
    }, 1200);
    showMusicBtn();
    tryAutoPlayMusic();
  }, 1100);
}

// ========== Fireworks / Heart Particles ==========
const fwCanvas = document.getElementById('fireworks-canvas');
const fwCtx = fwCanvas.getContext('2d');
let fwW, fwH;
const fwParticles = [];
let fwAnimating = false;

function resizeFW() {
  fwW = fwCanvas.width = window.innerWidth;
  fwH = fwCanvas.height = window.innerHeight;
}
resizeFW();
window.addEventListener('resize', resizeFW);

class FWParticle {
  constructor(x, y, color, isHeart) {
    this.x = x; this.y = y;
    this.color = color;
    this.isHeart = isHeart;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = Math.random() * 0.015 + 0.008;
    this.size = isHeart ? Math.random() * 8 + 6 : Math.random() * 3 + 1;
    this.gravity = 0.05;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.99;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    if (this.isHeart) {
      this.drawHeart(ctx, this.size);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  drawHeart(ctx, s) {
    ctx.beginPath();
    const d = s / 2;
    ctx.moveTo(0, d * 0.4);
    ctx.bezierCurveTo(-d, -d * 0.6, -d * 1.8, d * 0.4, 0, d * 1.6);
    ctx.bezierCurveTo(d * 1.8, d * 0.4, d, -d * 0.6, 0, d * 0.4);
    ctx.fill();
  }
}

function spawnFireworks(cx, cy) {
  const colors = ['#ff1744','#f50057','#ff4081','#e91e63','#ff6d00','#ffab40','#ff6090','#ffcdd2'];
  for (let i = 0; i < 60; i++) {
    const c = colors[Math.floor(Math.random() * colors.length)];
    fwParticles.push(new FWParticle(cx, cy, c, Math.random() > 0.6));
  }
  if (!fwAnimating) { fwAnimating = true; animateFireworks(); }
}

function animateFireworks() {
  fwCtx.clearRect(0, 0, fwW, fwH);
  for (let i = fwParticles.length - 1; i >= 0; i--) {
    fwParticles[i].update();
    fwParticles[i].draw(fwCtx);
    if (fwParticles[i].life <= 0) fwParticles.splice(i, 1);
  }
  if (fwParticles.length > 0) {
    requestAnimationFrame(animateFireworks);
  } else {
    fwAnimating = false;
    fwCtx.clearRect(0, 0, fwW, fwH);
  }
}

// ========== Love Button ==========
let loveCount = 0;
function showLove(btn) {
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
  // Ripple
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  ripple.style.width = ripple.style.height = Math.max(rect.width, rect.height) + 'px';
  ripple.style.left = '50%';
  ripple.style.top = '50%';
  ripple.style.marginLeft = -Math.max(rect.width, rect.height) / 2 + 'px';
  ripple.style.marginTop = -Math.max(rect.width, rect.height) / 2 + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  loveCount++;
  // Spawn fireworks at button position
  const bx = rect.left + rect.width / 2;
  const by = rect.top + rect.height / 2;
  spawnFireworks(bx, by);
  // Extra bursts
  setTimeout(() => spawnFireworks(bx - 60, by - 80), 200);
  setTimeout(() => spawnFireworks(bx + 60, by - 60), 400);

  // Show popup
  const popup = document.getElementById('love-popup');
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 2500);
}

// ========== Background Music (Web Audio API) ==========
let audioCtx = null;
let musicPlaying = false;
let musicInterval = null;

function createMusic() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // A gentle lullaby-like melody using pentatonic scale
  const notes = [523.25, 587.33, 659.25, 783.99, 880, 783.99, 659.25, 587.33,
                 523.25, 392, 440, 523.25, 587.33, 523.25, 440, 392,
                 523.25, 659.25, 783.99, 880, 783.99, 659.25, 523.25, 440,
                 392, 440, 523.25, 587.33, 523.25, 440, 392, 349.23];
  let idx = 0;
  function playNote() {
    if (!musicPlaying || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = notes[idx % notes.length];
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.85);
    idx++;
  }
  playNote();
  musicInterval = setInterval(playNote, 900);
}

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (musicPlaying) {
    musicPlaying = false;
    clearInterval(musicInterval);
    musicInterval = null;
    btn.classList.remove('playing');
    btn.textContent = '🎵';
  } else {
    musicPlaying = true;
    createMusic();
    btn.classList.add('playing');
    btn.textContent = '🎶';
  }
}

function showMusicBtn() {
  document.getElementById('music-btn').classList.remove('hidden');
}

function tryAutoPlayMusic() {
  // Try autoplay (may be blocked by browser)
  musicPlaying = true;
  createMusic();
  const btn = document.getElementById('music-btn');
  btn.classList.add('playing');
  btn.textContent = '🎶';
  // If autoplay blocked, user can tap to start
  if (audioCtx && audioCtx.state === 'suspended') {
    musicPlaying = false;
    clearInterval(musicInterval);
    btn.classList.remove('playing');
    btn.textContent = '🎵';
    btn.addEventListener('click', function handler() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (!musicPlaying) toggleMusic();
      btn.removeEventListener('click', handler);
    }, { once: true });
  }
}
</script>
</body>
</html>
